<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MB Seguros — CRM</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
<style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#4A90D9;--med:#2E6DA4;--light:#EBF4FC;
  --dark:#3D4554;
  --sidebar-bg:#2C3444;--sidebar-hover:#3D4E66;
  --green:#27AE60;--gl:#E8F8F0;
  --amber:#F39C12;--al:#FEF9E7;
  --red:#E74C3C;--rl:#FDEDEC;
  --border:#E8ECF0;--bg:#F4F6F9;--white:#fff;
  --text:#2C3444;--muted:#6B7280;--lt:#9CA3AF;
  --r:10px;--rsm:7px;
  --shadow:0 2px 8px rgba(0,0,0,.08)
}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
input,select,textarea,button{font-family:inherit;font-size:14px}

/* LOGIN */
.lw{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.lb{background:var(--white);border-radius:16px;padding:40px;width:100%;max-width:400px;border:0.5px solid var(--border)}
.lt{font-size:26px;font-weight:700;color:var(--blue);text-align:center;margin-bottom:4px}
.ls{font-size:13px;color:var(--muted);text-align:center;margin-bottom:24px}
.fl{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;margin-top:12px;font-weight:500}
.fi{width:100%;padding:10px 14px;border:0.5px solid var(--border);border-radius:var(--rsm);background:var(--bg);color:var(--text)}
.fi:focus{outline:none;border-color:var(--med)}
.bl{width:100%;padding:11px;background:var(--blue);color:#fff;border:none;border-radius:var(--rsm);font-weight:600;cursor:pointer;margin-top:16px}
.bl:hover{opacity:.88}
.bl-g{background:var(--green)}
.err-box{background:var(--rl);color:#791F1F;padding:8px 12px;border-radius:var(--rsm);font-size:12px;display:none;margin-bottom:12px}
.err-box.show{display:block}

/* APP */
.app{display:none;min-height:100vh}
.app.show{display:flex}
.sidebar{width:240px;background:#1E2A3B;border-right:none;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:100}
.sb-logo{padding:18px 16px 12px;border-bottom:0.5px solid var(--border)}
.sb-title{font-size:15px;font-weight:700;color:var(--blue)}
.sb-sub{font-size:11px;color:var(--lt);margin-top:2px}
.sb-nav{flex:1;padding:8px 0}
.nav-sec{padding:14px 20px 4px;font-size:9px;font-weight:600;color:rgba(255,255,255,.28);letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
.nav-btn{display:flex;align-items:center;gap:10px;padding:8px 12px;margin:1px 8px;cursor:pointer;color:rgba(255,255,255,.55);font-size:13px;font-family:'Inter',sans-serif;border:none;border-radius:7px;width:calc(100% - 16px);text-align:left;background:none;transition:all .2s ease;line-height:1.3}.nav-btn svg{flex-shrink:0;opacity:.7;transition:opacity .2s}
.nav-btn:hover{background:rgba(255,255,255,.08);color:#fff}.nav-btn:hover svg{opacity:1}
.nav-btn.active{background:rgba(74,144,217,.2);color:#74B3F0;font-weight:600}.nav-btn.active svg{opacity:1;stroke:#74B3F0}
.sb-foot{padding:12px 16px;border-top:1px solid rgba(255,255,255,.08);font-size:12px}
.sb-name{display:block;font-weight:600;font-size:13px;color:#fff;margin-bottom:2px}
.btn-out{background:none;border:none;font-size:11px;color:rgba(255,255,255,.35);cursor:pointer;padding:0}
.btn-out:hover{color:var(--red)}
.main{margin-left:220px;flex:1;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:13px 24px;background:var(--white);border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:50}
.topbar-t{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-.2px}
.page{padding:24px;flex:1}
.sec{display:none}.sec.active{display:block}

/* COMPONENTES */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--rsm);font-size:13px;cursor:pointer;border:0.5px solid var(--border);background:var(--white);color:var(--text)}
.btn:hover{background:var(--bg)}
.btn-p{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-p:hover{opacity:.88}
.btn-ok{background:var(--green);color:#fff;border-color:var(--green)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-danger{background:var(--red);color:#fff;border-color:var(--red)}
.card{background:var(--white);border:0.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.card-t{font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.g3{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.metric{background:var(--bg);border-radius:var(--rsm);padding:13px 15px}
.metric .lbl{font-size:11px;color:var(--lt);margin-bottom:4px}
.metric .val{font-size:22px;font-weight:600}
.metric .sub{font-size:10px;color:var(--lt);margin-top:3px}
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.bv{background:var(--gl);color:#27500A}
.ba{background:var(--al);color:#633806}
.br{background:var(--rl);color:#791F1F}
.bb{background:var(--light);color:#0C447C}
.bgr{background:#F1EFE8;color:#444441}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:11px;font-weight:600;color:var(--muted);padding:8px 12px;border-bottom:0.5px solid var(--border);background:var(--bg)}
td{padding:9px 12px;border-bottom:0.5px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg)}
.tbl{border:0.5px solid var(--border);border-radius:var(--r);overflow:hidden}
.frow{margin-bottom:12px}
.frow label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:4px}
.frow input,.frow select,.frow textarea{width:100%;padding:8px 11px;border:0.5px solid var(--border);border-radius:var(--rsm);background:var(--bg);color:var(--text)}
.frow input:focus,.frow select:focus,.frow textarea:focus{outline:none;border-color:var(--med)}
.frow textarea{resize:vertical;min-height:70px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.srch{padding:8px 13px;border:0.5px solid var(--border);border-radius:var(--rsm);background:var(--bg);color:var(--text);width:240px}
.toprow{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.modal-ov.open{display:flex}
.modal-box{background:var(--white);border-radius:14px;padding:22px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto}
.modal-t{font-size:15px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.modal-x{background:none;border:none;font-size:20px;cursor:pointer;color:var(--lt)}
.alerta{padding:10px 14px;border-radius:var(--rsm);font-size:12px;margin-bottom:12px;display:none}
.alerta.show{display:block}
.alerta-ok{background:var(--gl);color:#27500A;border:0.5px solid #97C459}
.alerta-err{background:var(--rl);color:#791F1F}
.loading{text-align:center;padding:30px;color:var(--lt);font-size:13px}
.spin{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--med);border-radius:50%;animation:spin .7s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:50px 20px;color:var(--lt)}
.pbar{height:6px;background:var(--bg);border-radius:3px;overflow:hidden;margin-top:4px}
.pfill{height:100%;border-radius:3px}
.ai{display:flex;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--border)}
.ai:last-child{border-bottom:none}
.adot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.sec-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.06em;margin:14px 0 8px;padding-bottom:4px;border-bottom:0.5px solid var(--border)}

/* FICHA CLIENTE */
.ficha-wrap{display:none}
.ficha-wrap.open{display:block}
.ficha-tabs{display:flex;gap:0;border-bottom:0.5px solid var(--border);margin-bottom:16px;overflow-x:auto}
.ftab{background:none;border:none;border-bottom:2px solid transparent;padding:8px 14px;font-size:12px;cursor:pointer;color:var(--muted);white-space:nowrap}
.ftab.active{color:var(--med);font-weight:500;border-bottom-color:var(--med)}
.info-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid var(--border);font-size:13px}
.info-row:last-child{border-bottom:none}
.info-row span:first-child{color:var(--muted)}
.info-row span:last-child{font-weight:500}

/* ===== KANBAN MEJORADO ===== */
.kanban-board{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;align-items:start}
.kanban-col{background:var(--bg);border-radius:var(--r);border:1px solid var(--border);overflow:hidden}
.kanban-col-header{padding:11px 12px;display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--border);background:var(--white)}
.kanban-col-title{font-size:11px;font-weight:700;color:var(--text);flex:1;text-transform:uppercase;letter-spacing:.05em}
.kanban-col-cnt{font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px;background:var(--bg);color:var(--muted)}
.kanban-body{padding:8px;min-height:180px;display:flex;flex-direction:column;gap:7px}
.task-card{background:var(--white);border:1px solid var(--border);border-radius:var(--rsm);box-shadow:0 1px 3px rgba(0,0,0,.05);cursor:pointer;transition:all .15s;overflow:hidden}
.task-card:hover{box-shadow:0 3px 10px rgba(0,0,0,.1);transform:translateY(-1px)}
.task-card-top{display:flex;align-items:center;justify-content:space-between;padding:7px 10px 4px}
.task-cat{font-size:10px;font-weight:700;padding:3px 7px;border-radius:4px;text-transform:uppercase}
.cat-ventas{background:#EBF4FC;color:#1A5276}
.cat-siniestros{background:#FDEDEC;color:#922B21}
.cat-cobranzas{background:#FEF9E7;color:#7D6608}
.cat-renovaciones{background:#F5EEF8;color:#6C3483}
.cat-general{background:#F0F2F5;color:#4B5563}
.prio-icon{width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}
.pi-urgente{background:#FDEDEC;color:#922B21}
.pi-alta{background:#FEF9E7;color:#7D6608}
.pi-media{background:#EBF4FC;color:#1A5276}
.pi-baja{background:#F0F2F5;color:#6B7280}
.task-card-body{padding:3px 10px 7px}
.task-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px;line-height:1.35}
.task-client-name{font-size:11px;color:var(--muted);margin-bottom:1px}
.task-tipo{font-size:10px;color:var(--lt)}
.task-card-footer{display:flex;align-items:center;justify-content:space-between;padding:5px 10px 7px;border-top:1px solid var(--border)}
.task-actions-row{display:flex;gap:3px}
.t-action{background:none;border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:11px;cursor:pointer;color:var(--muted)}
.t-action:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
.date-chip{font-size:10px;font-weight:700;background:var(--light);color:var(--med);padding:2px 7px;border-radius:10px}
.date-chip.late{background:var(--rl);color:var(--red)}
/* Ctx menu */
.ctx-menu{position:fixed;background:var(--white);border:1px solid var(--border);border-radius:var(--rsm);box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:500;min-width:185px;padding:4px 0;display:none}
.ctx-menu.show{display:block}
.ctx-item{display:flex;align-items:center;gap:9px;padding:9px 15px;font-size:13px;cursor:pointer;color:var(--text)}
.ctx-item:hover{background:var(--bg)}
.ctx-item.danger{color:var(--red)}
.ctx-sep{height:1px;background:var(--border);margin:3px 0}

/* Modal tarea detalle */
#tar-comentarios::-webkit-scrollbar{width:4px}
#tar-comentarios::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}



/* ===== TABLA CLIENTES ===== */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

/* Section header */
.cl-section-header{display:flex;align-items:center;gap:16px;padding:20px 0 18px}
.cl-section-icon{width:52px;height:52px;background:#EBF4FC;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cl-section-title{font-size:24px;font-weight:700;color:#1a2332;letter-spacing:-.4px;line-height:1.2}
.cl-section-sub{font-size:13px;color:#6B7280;margin-top:3px;font-weight:400}

/* Search + filters bar */
.cl-search-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.cl-search-wrap{position:relative;flex:1;min-width:240px}
.cl-search-wrap input{width:100%;padding:9px 14px 9px 38px;border:1.5px solid #E5E7EB;border-radius:8px;font-size:13px;font-family:'Inter',sans-serif;color:#374151;background:#fff;outline:none;transition:border-color .2s}
.cl-search-wrap input:focus{border-color:#4A90D9}
.cl-search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#9CA3AF;pointer-events:none}
.cl-filter{display:flex;align-items:center;gap:6px;padding:8px 12px;border:1.5px solid #E5E7EB;border-radius:8px;font-size:13px;font-family:'Inter',sans-serif;color:#374151;background:#fff;cursor:pointer;outline:none;appearance:none;-webkit-appearance:none}
.cl-filter:focus{border-color:#4A90D9}
.cl-filter-wrap{position:relative;display:flex;align-items:center}
.cl-filter-wrap::after{content:'▾';position:absolute;right:10px;font-size:10px;color:#9CA3AF;pointer-events:none}
.cl-filter-wrap select{padding-right:28px}
.btn-nuevo-cl{display:inline-flex;align-items:center;gap:8px;padding:9px 18px;background:#4A90D9;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;box-shadow:0 2px 6px rgba(74,144,217,.3);transition:all .2s;white-space:nowrap}
.btn-nuevo-cl:hover{background:#3a7bc8;box-shadow:0 4px 10px rgba(74,144,217,.4);transform:translateY(-1px)}

/* Count */
.cl-count{font-size:13px;color:#6B7280;margin-bottom:12px;font-weight:500;font-family:'Inter',sans-serif}

/* Table */
.cl-table{background:transparent}
.cl-table-header{display:grid;grid-template-columns:2.2fr 1.9fr 1.6fr 1.1fr 80px;background:transparent;border-bottom:1px solid #E5E7EB;padding:8px 0;margin-bottom:6px}
.cl-th{font-size:10px;font-weight:600;color:#6B7280;text-transform:uppercase;letter-spacing:.08em;padding:0 20px}
.cl-row{display:grid;grid-template-columns:2.2fr 1.9fr 1.6fr 1.1fr 80px;align-items:center;min-height:72px;padding:14px 0;border:1px solid #F3F4F6;border-left:3px solid transparent;border-radius:8px;cursor:pointer;background:#fff;transition:all .2s ease;font-family:'Inter',sans-serif;margin-bottom:8px}
.cl-row:last-child{margin-bottom:0}
.cl-row:hover{background:#F9FAFB;box-shadow:0 2px 6px rgba(0,0,0,.05);transform:translateY(-1px)}
.cl-row.st-activo{border-left-color:#22C55E}
.cl-row.st-prospecto{border-left-color:#4A90D9}
.cl-row.st-inactivo{border-left-color:#D1D5DB}
.cl-row.st-renovacion{border-left-color:#F59E0B}
.cl-row.st-siniestrado{border-left-color:#EF4444}
.cl-col{padding:0 20px;min-width:0}

/* Client name */
.cl-name{font-size:15px;font-weight:600;color:#111827;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.1px}
.cl-badges{display:flex;gap:5px;flex-wrap:wrap}
.cl-estado{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;display:inline-block;font-family:'Inter',sans-serif}
.est-activo{background:#DCFCE7;color:#166534}
.est-prospecto{background:#DBEAFE;color:#1E40AF}
.est-inactivo{background:#F3F4F6;color:#6B7280}
.est-renovacion{background:#FEF3C7;color:#92400E}
.est-siniestrado{background:#FEE2E2;color:#991B1B}

/* Data lines */
.cl-dline{font-size:13px;color:#4B5563;margin-bottom:5px;display:flex;align-items:center;gap:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cl-dline:last-child{margin-bottom:0}
.cl-dline svg{flex-shrink:0;opacity:.6}
.cl-dline-val{overflow:hidden;text-overflow:ellipsis}
.cl-dline-sub{font-size:12px;color:#9CA3AF;padding-left:24px;margin-top:3px}
